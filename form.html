<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Call - Karthikeya Kusuma Math Tutoring</title>
  <meta name="description"
    content="Book a free introductory call with Karthikeya Kusuma for personalized math tutoring." />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
  </style>
</head>

<body>

  <div class="form-container">
    <h2>Book a Call</h2>

    <!-- Error Message -->
    <p id="error-message" class="error-message"></p>

    <!-- Contact Form -->
    <form id="contact-form" class="contact-form">
      <input type="hidden" name="access_key" value="b29bdf14-d94b-4eae-963d-2485ebfdc529" />

      <div class="input-group">
        <label for="name">Name <span class="required">*</span></label>
        <input type="text" id="name" name="name" required aria-label="Your full name">
      </div>

      <div class="input-group">
        <label for="mobile">Mobile <span class="required">*</span></label>
        <input type="tel" id="mobile" name="mobile" required pattern="[0-9]{10,15}" placeholder="Enter mobile number"
          aria-label="Mobile phone number">
      </div>

      <div class="input-group">
        <label for="grade">Student’s Grade</label>
        <input type="text" id="grade" name="grade" placeholder="e.g. 8th Grade" aria-label="Student grade level">
      </div>

      <div class="input-group">
        <label for="math_score">Math Score (Average)</label>
        <input type="number" id="math_score" name="math_score" min="0" max="100" placeholder="e.g. 85"
          aria-label="Average math score">
      </div>

      <div class="input-group">
        <label for="email">Email (Optional)</label>
        <input type="email" id="email" name="email" placeholder="Enter email (optional)" aria-label="Email address">
      </div>

      <div class="input-group">
        <label for="expectations">Parents’ Expectations from Tutor</label>
        <textarea id="expectations" name="expectations" rows="4" placeholder="Write your expectations..."
          aria-label="Parents expectations from tutor"></textarea>
      </div>

      <button type="submit" class="contact-btn">Send Message</button>
    </form>
  </div>

  <script>
    document.getElementById("contact-form").addEventListener("submit", async function (event) {
      event.preventDefault();
      let formData = new FormData(this);
      let errorElement = document.getElementById("error-message");

      try {
        let response = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          body: formData
        });

        let result = await response.json();

        if (result.success) {
          // Redirect to Thank You page
          window.location.href = "thank-you.html";
        } else {
          errorElement.textContent = "❌ Error sending message. Please try again.";
          errorElement.style.display = "block";
        }
      } catch (error) {
        errorElement.textContent = "❌ Network error. Please try again later.";
        errorElement.style.display = "block";
      }
    });
  </script>

</body>

</html>
